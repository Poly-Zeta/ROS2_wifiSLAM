ekf_filter_node:
  ros__parameters:
    print_diagnostics: true
    frequency: 30.0
    sensor_timeout: 0.2

    # 2D ロボット前提
    two_d_mode: true

    # TF を EKF が出す
    publish_tf: true

    # フレーム
    map_frame: map        # 今は使わない（SLAM後で意味を持つ）
    odom_frame: odom
    base_link_frame: base_link
#    base_link_output_frame: base_link
    world_frame: odom     # ← 重要（SLAMなし時）

    # ======================
    # wheel odom（生）
    # ======================
    odom0: /wheel/odom
    odom0_config: [
      true,  true,  false,   # x, y, z
      false, false, true,    # roll, pitch, yaw
      true,  true,  false,   # vx, vy, vz
      false, false, true,    # vroll, vpitch, vyaw
      false, false, false    # ax, ay, az
    ]
    odom0_differential: false
    odom0_relative: true
#    odom0_queue_size: 10

    # ======================
    # IMU
    # ======================
    imu0: /i2cReceive/imu
    imu0_config: [
      false, false, false,   # x, y, z
      false, false, false,   # roll, pitch, yaw（姿勢は信用しない）
      false, false, false,   # vx, vy, vz
      false, false, true,    # vroll, vpitch, vyaw（★角速度Zだけ使う）
      false, false, false    # ax, ay, az
    ]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

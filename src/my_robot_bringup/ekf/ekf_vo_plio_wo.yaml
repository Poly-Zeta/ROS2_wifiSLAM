ekf_filter_node:
  ros__parameters:
    print_diagnostics: true
    frequency: 30.0
    sensor_timeout: 0.5
    predict_to_current_time: true

    # ★ RTAB-Map用：2D拘束を外す
    two_d_mode: false

    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom    # RTAB-Mapが map→odom を担当

    # ======================
    # wheel / track odom
    # ======================
    odom0: /wheel/odom
    odom0_config: [
      true,  true,  false,   # x, y, z
      false, false, true,    # roll, pitch, yaw（yawのみ）
      false,  false, false,   # vx, vy, vz
      false, false, false,    # vroll, vpitch, vyaw
      false, false, false
    ]
    odom0_differential: false
    odom0_relative: true

    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    # ======================
    # Point-LIO odom
    # ======================
    odom1: /odom_corrected
    odom1_config: [
      true,  true,  true,     # x, y, z
      true,  true,  true,     # roll, pitch, yaw
      false, false, false,    # vx, vy, vz
      false, false, false,    # vroll, vpitch, vyaw
      false, false, false
    ]
    odom1_differential: false
    odom1_relative: true

    odom1_pose_rejection_threshold: 5.0
    odom1_twist_rejection_threshold: 1.0

    # ======================
    # RTAB-Map visual odom
    # ======================
    odom2: /visual_odom
    odom2_config: [
      true,  true,  true,     # x, y, z
      true,  true,  true,     # roll, pitch, yaw
      false, false, false,    # vx, vy, vz
      false, false, false,    # vroll, vpitch, vyaw
      false, false, false
    ]
    odom2_differential: false
    odom2_relative: true

    odom2_pose_rejection_threshold: 5.0
    odom2_twist_rejection_threshold: 1.0
